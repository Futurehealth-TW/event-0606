<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #ffffff; 
            width: 100%; 
            overflow-x: hidden; 
        }
        body { 
            display: block; 
        }
        img { 
            display: block; 
            width: 100%; 
            height: auto; 
            margin: 0; 
        }
    </style>
</head>
<body>
    <img id="myImage" src="">

    <script>
        // 注意：這裡已經改成讀取 event.jpg
        var imgUrl = "event.jpg"; 
        var timestamp = new Date().getTime();
        document.getElementById('myImage').src = imgUrl + "?t=" + timestamp;
    </script>
</body>
</html>
